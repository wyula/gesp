<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCF-GESP C++课程</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/highlight/atom-one-dark.min.css">
    <link rel="icon" href="image/c++.png" type="image/png">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>📚 课程目录</h2>
            <div class="course-selector">
                <button class="course-tab" onclick="coursePlayer.loadLevel('level1')">一级课程</button>
                <button class="course-tab" onclick="coursePlayer.loadLevel('level2')">二级课程</button>
                <button class="course-tab active" onclick="coursePlayer.loadLevel('level3')">三级课程</button>
                <button class="course-tab" onclick="coursePlayer.loadLevel('level4')">四级课程</button>
            </div>
            <ul class="nav-list" id="nav-list">
            </ul>
        </div>
        <div class="main-content">
            <div class="header">
                <h1 id="lesson-title">CCF-GESP C++三级 - 第1课 数组</h1>
                <div class="header-right">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <button class="btn-presentation" id="btn-presentation">🎤 演示模式</button>
                </div>
            </div>
            <div class="slide-container" id="slide-container">
            </div>
            <div class="nav-buttons">
                <button class="btn-nav" id="btn-prev">◀ 上一页</button>
                <span class="page-indicator" id="page-indicator">第 1 / 1 页</span>
                <button class="btn-nav next" id="btn-next">下一页 ▶</button>
            </div>
        </div>
    </div>
    <script src="js/highlight/highlight.min.js"></script>
    <script src="js/highlight/cpp.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
