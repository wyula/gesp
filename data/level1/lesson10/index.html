        <div class="quiz-question">（2023年9月）在下面的C++代码中，由于循环中的continue是无条件被执行，因此将导致死循环。 for(int i=1;i<10;i++) continue;</div>

            【解析】for循环中，continue跳过本次循环体剩余语句后，会继续执行表达式3（i++），然后判断表达式2（i<10）。所以i会正常递增，循环不会死循环。
