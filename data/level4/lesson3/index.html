<div class="slide">
    <h2 class="slide-subtitle-center">动态数组概述</h2>
    <div class="slide-content">
        <p><strong>动态数组</strong>是在程序运行时根据需要动态分配内存的数组。</p>
        <p>与静态数组不同，动态数组的大小可以在运行时确定。</p>
        <br>
        <p><strong>主要特点：</strong></p>
        <p>- 灵活性：大小可以在运行时动态调整</p>
        <p>- 内存管理：需要手动分配和释放内存</p>
        <p>- 使用指针：动态数组通常通过指针访问</p>
    </div>
</div>

<div class="slide">
    <h2 class="slide-subtitle-center">使用new和delete</h2>
    <div class="slide-content">
        <p><strong>动态分配数组：</strong></p>
        <div class="code-block">
            int* arr = new int[10];<br>
            // 分配可以存储10个int的数组
        </div>
        <br>
        <p><strong>释放数组：</strong></p>
        <div class="code-block">
            delete[] arr;
        </div>
        <br>
        <p><strong>注意：</strong></p>
        <p>- 使用delete[]释放数组，而不是delete</p>
        <p>- 避免内存泄漏，确保每个new对应一个delete</p>
    </div>
</div>
